<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing you in… — REBWB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <p id="status" class="text-lg text-gray-300">Signing you in…</p>
    </div>
    <script src="js/auth-init.js"></script>
    <script>
        (function() {
            const status = document.getElementById('status');
            const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const token = hash.get('token');

            if (!token) {
                status.textContent = 'Sign-in failed: missing token. Try requesting a new link.';
                return;
            }

            window.REBWB.setToken(token);

            const next = sessionStorage.getItem('rebwb_post_login_redirect') || '/course.html';
            sessionStorage.removeItem('rebwb_post_login_redirect');
            // Clear the hash so the token isn't kept in browser history.
            history.replaceState(null, '', window.location.pathname);
            window.location.replace(next);
        })();
    </script>
</body>
</html>
