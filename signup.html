<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - REBWB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-xl font-bold text-white">REBWB</a>
                <div class="flex items-center space-x-6">
                    <a href="index.html" class="text-gray-300 hover:text-white transition">Home</a>
                    <a href="course.html" class="text-gray-300 hover:text-white transition">Course</a>
                    <a href="dealpilot.html" class="text-gray-300 hover:text-white transition">DealPilot</a>
                    <a href="templates.html" class="text-gray-300 hover:text-white transition">Templates</a>
                    <a href="tools.html" class="text-gray-300 hover:text-white transition">Tools</a>
                    <a href="faq.html" class="text-gray-300 hover:text-white transition">FAQ</a>
                    <a href="about.html" class="text-gray-300 hover:text-white transition">About</a>
                    <a href="login.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Signup -->
    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="bg-gray-800 rounded-lg p-8 border border-gray-700">
                <h1 class="text-2xl font-bold text-center mb-2">Create your account</h1>
                <p class="text-gray-400 text-center mb-6">Enter your email — we'll send you a sign-in link. No password needed.</p>

                <div id="error-message" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded mb-4"></div>

                <form id="auth-form" class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email"
                            class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                    </div>
                    <button type="submit" id="submit-btn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition">
                        Send sign-in link
                    </button>
                </form>

                <div id="sent-message" class="hidden text-center mt-6">
                    <p class="text-green-300 mb-2">Check your inbox.</p>
                    <p class="text-gray-400 text-sm">We sent a sign-in link to <span id="sent-email" class="text-white"></span>. The link expires in 15 minutes.</p>
                </div>

                <p class="mt-6 text-center text-gray-400">
                    Already have an account? <a href="login.html" class="text-blue-400 hover:text-blue-300">Sign in</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/auth-init.js"></script>
    <script>
        (() => {
            if (window.REBWB.isSignedIn()) {
                window.location.href = '/course.html';
                return;
            }

            const form = document.getElementById('auth-form');
            const errorMsg = document.getElementById('error-message');
            const sentMsg = document.getElementById('sent-message');
            const sentEmailEl = document.getElementById('sent-email');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.classList.add('hidden');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending…';

                const email = document.getElementById('email').value.trim();
                try {
                    const res = await window.REBWB.apiFetch('/api/auth/request', {
                        method: 'POST',
                        body: JSON.stringify({ email }),
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);

                    form.classList.add('hidden');
                    sentEmailEl.textContent = email;
                    sentMsg.classList.remove('hidden');
                } catch (err) {
                    errorMsg.textContent = err.message || 'Failed to send link. Try again.';
                    errorMsg.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send sign-in link';
                }
            });
        })();
    </script>
</body>
</html>
