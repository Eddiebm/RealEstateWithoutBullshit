<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - REBWB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <meta http-equiv="refresh" content="6;url=/login.html">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-xl font-bold text-white">REBWB</a>
                <a href="login.html" class="text-gray-300 hover:text-white transition">Sign in</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="bg-gray-800 rounded-lg p-8 border border-gray-700 text-center">
                <h1 class="text-2xl font-bold mb-3">No passwords here</h1>
                <p class="text-gray-300 mb-6">
                    REBWB now uses magic-link sign-in — there's nothing to reset.
                    Just enter your email on the sign-in page and we'll send you a link.
                </p>
                <a href="login.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition">
                    Go to sign in
                </a>
                <p class="text-gray-500 text-sm mt-6">Redirecting in a few seconds…</p>
            </div>
        </div>
    </main>
</body>
</html>
